<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Comparison Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            background: linear-gradient(180deg, #fff5e6 0%, #ffe6cc 100%);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5em;
            color: #ff6b6b;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 1.2em;
            color: #4ecdc4;
            margin-bottom: 10px;
        }

        .score-display {
            font-size: 1.3em;
            color: #2d3436;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        .game-area {
            margin: 40px 0;
        }

        .question-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .number-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 4em;
            font-weight: bold;
            width: 120px;
            height: 120px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .blank-space {
            color: #666;
            font-size: 2em;
            min-width: 30px;
        }

        .answer-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .sign-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            font-size: 2.5em;
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 80px;
        }

        .sign-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }

        .sign-btn:active {
            transform: translateY(-2px);
        }

        .sign-btn.less-than {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .sign-btn.equal {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .sign-btn.greater-than {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .feedback {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback.correct {
            color: #27ae60;
            animation: bounce 0.6s ease-in-out;
        }

        .feedback.incorrect {
            color: #e74c3c;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.2em;
            padding: 15px 35px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 150px;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }

        .action-btn:active {
            transform: translateY(-1px);
        }

        .restart-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #667eea;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotateZ(360deg);
                opacity: 0;
            }
        }

        .confetti-falling {
            animation: fall 3s linear forwards;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
                border-radius: 20px;
            }

            .title {
                font-size: 2em;
            }

            .number-box {
                width: 100px;
                height: 100px;
                font-size: 3em;
            }

            .sign-btn {
                font-size: 2em;
                padding: 15px 30px;
                min-width: 70px;
            }

            .action-btn {
                font-size: 1em;
                padding: 12px 25px;
                min-width: 120px;
            }

            .feedback {
                font-size: 1.5em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .game-container {
                padding: 15px;
                border-radius: 15px;
            }

            .title {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 1em;
            }

            .score-display {
                font-size: 1em;
            }

            .number-box {
                width: 80px;
                height: 80px;
                font-size: 2.5em;
            }

            .blank-space {
                font-size: 1.5em;
            }

            .sign-btn {
                font-size: 1.8em;
                padding: 12px 25px;
                min-width: 60px;
            }

            .action-btn {
                font-size: 0.95em;
                padding: 10px 20px;
                min-width: 100px;
            }

            .answer-buttons {
                gap: 10px;
            }

            .button-group {
                gap: 10px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">🎮 Number Game</h1>
            <p class="subtitle">Choose the correct sign!</p>
            <div class="score-display">Score: <span id="score">0</span>/<span id="total">0</span></div>
        </div>

        <div class="game-area">
            <div class="question-display">
                <div class="number-box" id="num1">5</div>
                <div class="blank-space">?</div>
                <div class="number-box" id="num2">3</div>
            </div>

            <div class="answer-buttons">
                <button class="sign-btn less-than" onclick="answerQuestion('<')">
                    &lt;
                </button>
                <button class="sign-btn equal" onclick="answerQuestion('=')">
                    =
                </button>
                <button class="sign-btn greater-than" onclick="answerQuestion('>')">
                    &gt;
                </button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <div class="button-group">
            <button class="action-btn" id="nextBtn" onclick="nextQuestion()">Next Question ➜</button>
            <button class="action-btn restart-btn" onclick="restartGame()">Restart Game 🔄</button>
        </div>
    </div>

    <script>
        let currentNum1, currentNum2;
        let score = 0;
        let totalQuestions = 0;
        let answered = false;

        // Audio Context for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSuccessSound() {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
            osc.frequency.setValueAtTime(783.99, now + 0.2); // G5

            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);

            osc.start(now);
            osc.stop(now + 0.6);
        }

        function playErrorSound() {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(200, now);
            osc.frequency.setValueAtTime(100, now + 0.2);

            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

            osc.start(now);
            osc.stop(now + 0.3);
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#667eea', '#f093fb', '#f5576c', '#ffd93d'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti confetti-falling';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.borderRadius = '50%';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function generateQuestion() {
            currentNum1 = Math.floor(Math.random() * 21); // 0-20
            currentNum2 = Math.floor(Math.random() * 21); // 0-20

            document.getElementById('num1').textContent = currentNum1;
            document.getElementById('num2').textContent = currentNum2;
            
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            answered = false;
            document.getElementById('nextBtn').style.opacity = '0.5';
            document.getElementById('nextBtn').style.pointerEvents = 'none';
        }

        function getCorrectAnswer() {
            if (currentNum1 < currentNum2) return '<';
            if (currentNum1 > currentNum2) return '>';
            return '=';
        }

        function answerQuestion(userAnswer) {
            if (answered) return;

            answered = true;
            totalQuestions++;
            const feedback = document.getElementById('feedback');
            const correctAnswer = getCorrectAnswer();

            if (userAnswer === correctAnswer) {
                score++;
                feedback.textContent = '✅ Correct!';
                feedback.className = 'feedback correct';
                playSuccessSound();
                createConfetti();
            } else {
                feedback.textContent = '❌ Try again!';
                feedback.className = 'feedback incorrect';
                playErrorSound();
            }

            document.getElementById('score').textContent = score;
            document.getElementById('total').textContent = totalQuestions;
            
            document.getElementById('nextBtn').style.opacity = '1';
            document.getElementById('nextBtn').style.pointerEvents = 'auto';
        }

        function nextQuestion() {
            generateQuestion();
        }

        function restartGame() {
            score = 0;
            totalQuestions = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('total').textContent = totalQuestions;
            generateQuestion();
        }

        // Initialize game
        window.addEventListener('load', () => {
            generateQuestion();
        });
    </script>
</body>
</html>
