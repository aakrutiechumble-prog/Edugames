<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>States of India Game</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#e7f7ff, #fff5d9);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}

/* MAIN CONTAINER */
.game-container {
  width: 100%;
  max-width: 700px;
  background: white;
  border-radius: 20px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* TITLE */
h1 {
  font-size: 22px;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 14px;
  margin-bottom: 14px;
}

/* SCORE */
.scoreboard {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
}

.score-box {
  background: #eef7ff;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
}

/* QUESTION */
.state-box {
  background: #e8f2ff;
  padding: 18px;
  border-radius: 16px;
  font-size: 22px;
  font-weight: bold;
  margin: 12px 0;
}

/* OPTIONS */
.button-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option-btn {
  padding: 14px;
  font-size: 14px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  background: #f4f4f4;
}

/* FEEDBACK */
.feedback {
  margin-top: 10px;
  min-height: 40px;
  font-weight: bold;
}

/* RESTART */
.restart-btn {
  margin-top: 12px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #4aa3df;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

/* 📱 MOBILE FIX */
@media (max-width: 600px) {

  h1 {
    font-size: 20px;
  }

  .state-box {
    font-size: 20px;
    padding: 14px;
  }

  .button-row {
    grid-template-columns: 1fr;
  }

  .option-btn {
    font-size: 16px;
    padding: 16px;
  }

  .score-box {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<div class="game-container">

  <h1>States of India</h1>
  <p class="subtitle">Choose the correct capital</p>

  <div class="scoreboard">
    <div class="score-box">Score: <span id="score">0</span></div>
    <div class="score-box">Q: <span id="qno">1</span>/10</div>
  </div>

  <div class="state-box" id="stateBox">Maharashtra</div>

  <div class="button-row" id="options"></div>

  <div class="feedback" id="feedback"></div>

  <button class="restart-btn" onclick="startGame()">Restart</button>

</div>

<script>

const questions = [
  {state:"Maharashtra", capital:"Mumbai"},
  {state:"Karnataka", capital:"Bengaluru"},
  {state:"Tamil Nadu", capital:"Chennai"},
  {state:"Gujarat", capital:"Gandhinagar"},
  {state:"Rajasthan", capital:"Jaipur"},
  {state:"West Bengal", capital:"Kolkata"},
  {state:"Uttar Pradesh", capital:"Lucknow"},
  {state:"Madhya Pradesh", capital:"Bhopal"},
  {state:"Bihar", capital:"Patna"},
  {state:"Punjab", capital:"Chandigarh"}
];

let current = 0;
let score = 0;

function startGame() {
  current = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {

  if(current >= questions.length){
    document.getElementById("feedback").innerHTML = "Game Over! Score: " + score;
    return;
  }

  let q = questions[current];

  document.getElementById("stateBox").innerText = q.state;
  document.getElementById("qno").innerText = current + 1;
  document.getElementById("score").innerText = score;

  let options = shuffle([
    q.capital,
    ...questions.map(x=>x.capital).filter(x=>x!==q.capital).slice(0,3)
  ]);

  let container = document.getElementById("options");
  container.innerHTML = "";

  options.forEach(opt => {
    let btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt);
    container.appendChild(btn);
  });

}

function checkAnswer(ans){

  let correct = questions[current].capital;

  if(ans === correct){
    score += 10;
    document.getElementById("feedback").innerText = "Correct!";
  } else {
    document.getElementById("feedback").innerText = "Wrong! Answer: " + correct;
  }

  current++;

  setTimeout(showQuestion, 1200);
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

startGame();

</script>

</body>
</html>
