<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>States of India Game</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e7f7ff 0%, #fff5d9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #2f3559;
    }

    .game-container {
      width: 100%;
      max-width: 850px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 26px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      padding: 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #confetti-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.6rem, 4vw, 2.3rem);
      color: #ff6b6b;
    }

    .subtitle {
      margin: 0 0 14px;
      font-size: clamp(0.9rem, 2.2vw, 1rem);
      color: #4f5577;
      line-height: 1.4;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .score-box {
      background: #f7fbff;
      border-radius: 14px;
      padding: 10px 14px;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .settings-panel {
      background: #f8fbff;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .settings-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #4f5577;
      font-size: 0.95rem;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mute-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      background: #e2f1ff;
      color: #2f3559;
    }

    .volume-label {
      font-weight: bold;
      color: #4f5577;
      font-size: 0.95rem;
    }

    #volumeControl {
      width: min(220px, 55vw);
      cursor: pointer;
    }

    #volumeValue {
      font-weight: bold;
      min-width: 44px;
      display: inline-block;
      color: #4f5577;
    }

    .question-card {
      padding: 18px 12px;
      margin-bottom: 14px;
    }

    .question-label {
      font-weight: bold;
      margin-bottom: 10px;
      color: #4f5577;
      font-size: 1rem;
    }

    .state-box {
      min-height: 80px;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 20px;
      background: #e9f3ff;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 10px;
    }

    .option-btn {
      border: none;
      border-radius: 18px;
      min-height: 70px;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: #2f3559;
      line-height: 1.3;
    }

    .option-btn:disabled {
      opacity: 0.9;
      cursor: default;
    }

    .option-btn:nth-child(1) { background: #ffe0e0; }
    .option-btn:nth-child(2) { background: #e2f1ff; }
    .option-btn:nth-child(3) { background: #e3ffeb; }
    .option-btn:nth-child(4) { background: #fff1cc; }

    .feedback {
      min-height: 50px;
      font-weight: bold;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.4;
      padding: 4px 6px;
    }

    .restart-btn {
      padding: 12px 20px;
      border-radius: 16px;
      background: #69c9f2;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .confetti {
      position: absolute;
      font-size: 24px;
      animation: fall linear forwards;
      pointer-events: none;
      user-select: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(650px) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .game-container {
        padding: 16px 12px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      .option-btn {
        min-height: 65px;
        font-size: 1rem;
      }

      .state-box {
        font-size: 1.8rem;
      }

      .score-box {
        font-size: 0.85rem;
        padding: 8px 10px;
      }

      .controls-row {
        gap: 8px;
      }

      .mute-btn {
        font-size: 0.9rem;
        padding: 9px 12px;
      }

      #volumeControl {
        width: min(180px, 52vw);
      }
    }
  </style>
</head>

<body>
  <div class="game-container">
    <div id="confetti-container"></div>

    <div class="content">
      <h1>States of India Game</h1>
      <p class="subtitle">Choose the correct capital city</p>

      <div class="scoreboard">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="score-box">Q: <span id="qno">1</span>/10</div>
      </div>

      <div class="settings-panel">
        <div class="settings-title">Sound Controls</div>
        <div class="controls-row">
          <button class="mute-btn" id="muteBtn" type="button">🔊 Sound On</button>
          <label class="volume-label" for="volumeControl">Volume</label>
          <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
          <span id="volumeValue">50%</span>
        </div>
      </div>

      <div class="question-card">
        <div class="question-label">What is the capital of this state?</div>
        <div class="state-box" id="stateBox"></div>
        <div class="button-row" id="options"></div>
        <div class="feedback" id="feedback"></div>
      </div>

      <button class="restart-btn" onclick="startGame()">Restart</button>
    </div>
  </div>

  <script>
    const allQuestions = [
      { state: "Maharashtra", capital: "Mumbai" },
      { state: "Karnataka", capital: "Bengaluru" },
      { state: "Tamil Nadu", capital: "Chennai" },
      { state: "Gujarat", capital: "Gandhinagar" },
      { state: "Rajasthan", capital: "Jaipur" },
      { state: "West Bengal", capital: "Kolkata" },
      { state: "Uttar Pradesh", capital: "Lucknow" },
      { state: "Madhya Pradesh", capital: "Bhopal" },
      { state: "Bihar", capital: "Patna" },
      { state: "Punjab", capital: "Chandigarh" },
      { state: "Haryana", capital: "Chandigarh" },
      { state: "Odisha", capital: "Bhubaneswar" },
      { state: "Assam", capital: "Dispur" },
      { state: "Kerala", capital: "Thiruvananthapuram" },
      { state: "Jharkhand", capital: "Ranchi" },
      { state: "Chhattisgarh", capital: "Raipur" },
      { state: "Himachal Pradesh", capital: "Shimla" },
      { state: "Uttarakhand", capital: "Dehradun" },
      { state: "Goa", capital: "Panaji" },
      { state: "Sikkim", capital: "Gangtok" }
    ];

    const allCapitals = [...new Set(allQuestions.map(q => q.capital))];

    let selectedQuestions = [];
    let current = 0;
    let score = 0;
    let locked = false;

    let audioCtx;
    let isMuted = false;
    let volume = 0.5;

    const stateBox = document.getElementById("stateBox");
    const qnoEl = document.getElementById("qno");
    const scoreEl = document.getElementById("score");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const confettiContainer = document.getElementById("confetti-container");
    const muteBtn = document.getElementById("muteBtn");
    const volumeControl = document.getElementById("volumeControl");
    const volumeValue = document.getElementById("volumeValue");

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    document.body.addEventListener("click", initAudio, { once: true });
    document.body.addEventListener("touchstart", initAudio, { once: true });

    muteBtn.addEventListener("click", function () {
      isMuted = !isMuted;
      muteBtn.textContent = isMuted ? "🔇 Sound Off" : "🔊 Sound On";
    });

    volumeControl.addEventListener("input", function () {
      volume = parseFloat(this.value);
      volumeValue.textContent = Math.round(volume * 100) + "%";
    });

    function startGame() {
      current = 0;
      score = 0;
      locked = false;
      selectedQuestions = shuffle(allQuestions).slice(0, 10);
      feedbackEl.textContent = "";
      showQuestion();
    }

    function showQuestion() {
      if (current >= selectedQuestions.length) {
        stateBox.textContent = "Game Over";
        optionsEl.innerHTML = "";
        feedbackEl.textContent = "Final Score: " + score + "/100";
        qnoEl.textContent = "10";
        scoreEl.textContent = score;
        return;
      }

      locked = false;

      const q = selectedQuestions[current];
      stateBox.textContent = q.state;
      qnoEl.textContent = current + 1;
      scoreEl.textContent = score;
      feedbackEl.textContent = "";

      const wrongOptions = shuffle(allCapitals.filter(c => c !== q.capital)).slice(0, 3);
      const options = shuffle([q.capital, ...wrongOptions]);

      optionsEl.innerHTML = "";

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option);
        optionsEl.appendChild(btn);
      });
    }

    function checkAnswer(answer) {
      if (locked) return;
      locked = true;

      const correct = selectedQuestions[current].capital;
      document.querySelectorAll(".option-btn").forEach(btn => btn.disabled = true);

      if (answer === correct) {
        score += 10;
        feedbackEl.textContent = "Correct!";
        confettiBurst();
        playSound(true);
      } else {
        feedbackEl.textContent = "Wrong! Answer: " + correct;
        playSound(false);
      }

      scoreEl.textContent = score;

      current++;
      setTimeout(showQuestion, 1200);
    }

    function playSound(correct) {
      if (isMuted) return;

      initAudio();
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = "triangle";
      osc.frequency.value = correct ? 700 : 220;

      gain.gain.setValueAtTime(Math.max(volume, 0.001), audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }

    function confettiBurst() {
      const stars = ["⭐", "🌟", "✨"];

      for (let i = 0; i < 30; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.textContent = stars[Math.floor(Math.random() * stars.length)];
        c.style.left = Math.random() * 100 + "%";
        c.style.animationDuration = (1 + Math.random()) + "s";
        confettiContainer.appendChild(c);

        setTimeout(() => c.remove(), 2000);
      }
    }

    startGame();
  </script>
</body>
</html>
