<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaporation - Grade 4 Science</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #cfefff 0%, #fef6d8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
      overflow: hidden;
    }

    .scene {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 26px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.12);
      padding: 18px 14px 22px;
      position: relative;
      overflow: hidden;
      border: 4px solid #ffffff;
    }

    .title {
      text-align: center;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: bold;
      color: #ff7b54;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: clamp(0.95rem, 2.4vw, 1.05rem);
      color: #5c678d;
      margin-bottom: 14px;
    }

    .animation-area {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background: linear-gradient(180deg, #bfe9ff 0%, #dff7ff 52%, #bde7a5 52%, #a5d67e 100%);
      border-radius: 22px;
      overflow: hidden;
      border: 3px solid #d8f0ff;
    }

    .sun {
      position: absolute;
      top: 22px;
      right: 28px;
      width: 84px;
      height: 84px;
      background: #ffd54d;
      border-radius: 50%;
      box-shadow: 0 0 0 10px rgba(255, 213, 77, 0.18), 0 0 30px rgba(255, 213, 77, 0.45);
      animation: sunPulse 3s ease-in-out infinite;
    }

    .sun::before {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 4px dashed rgba(255, 179, 0, 0.6);
      animation: spin 10s linear infinite;
    }

    .sun-label {
      position: absolute;
      top: 116px;
      right: 30px;
      background: rgba(255,255,255,0.88);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #7a5a00;
    }

    .ground-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 112px;
      height: 4px;
      background: rgba(88, 131, 62, 0.3);
    }

    .puddle-wrap {
      position: absolute;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%);
      width: min(52vw, 300px);
      height: 92px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .puddle {
      width: 100%;
      height: 68px;
      background: linear-gradient(180deg, #79d4ff 0%, #39b7f0 100%);
      border-radius: 50%;
      position: relative;
      animation: puddleShrink 15s linear infinite;
      transform-origin: center bottom;
      box-shadow: inset 0 8px 0 rgba(255,255,255,0.35);
    }

    .puddle::before {
      content: "";
      position: absolute;
      width: 70%;
      height: 34%;
      left: 15%;
      top: 12%;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
    }

    .water-label {
      position: absolute;
      left: 50%;
      bottom: 164px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #126d9d;
      animation: waterLabelFade 15s linear infinite;
    }

    .heat-rays {
      position: absolute;
      right: 120px;
      top: 92px;
      width: 140px;
      height: 120px;
    }

    .ray {
      position: absolute;
      width: 6px;
      height: 54px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,189,89,0.95), rgba(255,189,89,0.15));
      animation: rayGlow 1.6s ease-in-out infinite;
    }

    .ray:nth-child(1) { left: 8px; top: 2px; transform: rotate(18deg); animation-delay: 0s; }
    .ray:nth-child(2) { left: 44px; top: 18px; transform: rotate(35deg); animation-delay: 0.3s; }
    .ray:nth-child(3) { left: 78px; top: 34px; transform: rotate(50deg); animation-delay: 0.6s; }
    .ray:nth-child(4) { left: 110px; top: 50px; transform: rotate(62deg); animation-delay: 0.9s; }

    .heat-label {
      position: absolute;
      right: 138px;
      top: 182px;
      background: rgba(255,255,255,0.9);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: bold;
      color: #d67600;
      animation: heatPulse 2s ease-in-out infinite;
    }

    .vapour-zone {
      position: absolute;
      left: 50%;
      bottom: 176px;
      transform: translateX(-50%);
      width: min(46vw, 260px);
      height: 170px;
      pointer-events: none;
    }

    .vapour {
      position: absolute;
      bottom: 0;
      width: 28px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.85), rgba(255,255,255,0.18));
      opacity: 0;
      animation: rise 3.2s linear infinite;
      filter: blur(1px);
    }

    .vapour:nth-child(1) { left: 12%; animation-delay: 0s; }
    .vapour:nth-child(2) { left: 28%; animation-delay: 0.7s; }
    .vapour:nth-child(3) { left: 44%; animation-delay: 1.3s; }
    .vapour:nth-child(4) { left: 62%; animation-delay: 1.9s; }
    .vapour:nth-child(5) { left: 78%; animation-delay: 2.4s; }

    .vapour-label {
      position: absolute;
      left: 50%;
      top: 86px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #7a7ea8;
      animation: vapourLabelFade 15s linear infinite;
    }

    .info-box {
      margin-top: 14px;
      background: #f7fbff;
      border: 2px solid #d9efff;
      border-radius: 18px;
      padding: 12px 14px;
      text-align: center;
      font-size: clamp(0.98rem, 2.5vw, 1.08rem);
      font-weight: bold;
      color: #4a5476;
      min-height: 54px;
    }

    .sparkle {
      position: absolute;
      font-size: 18px;
      opacity: 0.75;
      animation: twinkle 2.2s ease-in-out infinite;
    }

    .sparkle.s1 { left: 8%; top: 12%; animation-delay: 0.2s; }
    .sparkle.s2 { left: 16%; top: 28%; animation-delay: 0.8s; }
    .sparkle.s3 { right: 22%; top: 24%; animation-delay: 1.2s; }
    .sparkle.s4 { right: 10%; top: 40%; animation-delay: 1.7s; }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rayGlow {
      0%, 100% { opacity: 0.45; transform: scaleY(1) rotate(var(--r, 0deg)); }
      50% { opacity: 1; transform: scaleY(1.12) rotate(var(--r, 0deg)); }
    }

    @keyframes puddleShrink {
      0%   { transform: scaleX(1) scaleY(1); }
      40%  { transform: scaleX(0.92) scaleY(0.96); }
      70%  { transform: scaleX(0.80) scaleY(0.84); }
      100% { transform: scaleX(0.68) scaleY(0.70); }
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.75);
        opacity: 0;
      }
      12% {
        opacity: 0.8;
      }
      70% {
        opacity: 0.55;
      }
      100% {
        transform: translateY(-138px) translateX(8px) scale(1.28);
        opacity: 0;
      }
    }

    @keyframes heatPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 0.95; transform: scale(1.2); }
    }

    @keyframes waterLabelFade {
      0%, 35% { opacity: 1; }
      60%, 100% { opacity: 0.55; }
    }

    @keyframes vapourLabelFade {
      0%, 12% { opacity: 0.15; }
      28%, 100% { opacity: 1; }
    }

    @media (max-width: 600px) {
      .sun {
        width: 70px;
        height: 70px;
        top: 18px;
        right: 18px;
      }

      .sun-label {
        top: 98px;
        right: 14px;
        font-size: 0.82rem;
      }

      .heat-rays {
        right: 90px;
        top: 78px;
        transform: scale(0.86);
        transform-origin: top right;
      }

      .heat-label {
        right: 92px;
        top: 156px;
        font-size: 0.8rem;
      }

      .water-label {
        bottom: 150px;
        font-size: 0.82rem;
      }

      .vapour-label {
        top: 76px;
        font-size: 0.82rem;
      }

      .info-box {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="title">Evaporation</div>
    <div class="subtitle">Watch how water changes into water vapour</div>

    <div class="animation-area">
      <div class="sparkle s1">✨</div>
      <div class="sparkle s2">✨</div>
      <div class="sparkle s3">✨</div>
      <div class="sparkle s4">✨</div>

      <div class="sun"></div>
      <div class="sun-label">Sun</div>

      <div class="heat-rays">
        <div class="ray" style="--r:18deg;"></div>
        <div class="ray" style="--r:35deg;"></div>
        <div class="ray" style="--r:50deg;"></div>
        <div class="ray" style="--r:62deg;"></div>
      </div>
      <div class="heat-label">Heat</div>

      <div class="ground-line"></div>

      <div class="water-label">Water</div>

      <div class="vapour-zone">
        <div class="vapour"></div>
        <div class="vapour"></div>
        <div class="vapour"></div>
        <div class="vapour"></div>
        <div class="vapour"></div>
      </div>

      <div class="vapour-label">Water Vapour</div>

      <div class="puddle-wrap">
        <div class="puddle"></div>
      </div>
    </div>

    <div class="info-box" id="infoText">
      Heat from the sun warms the water.
    </div>
  </div>

  <script>
    const infoText = document.getElementById("infoText");

    const messages = [
      "Heat from the sun warms the water.",
      "Water slowly changes into water vapour.",
      "Water vapour rises into the air.",
      "This process is called evaporation."
    ];

    let index = 0;

    function updateText() {
      infoText.textContent = messages[index];
      index = (index + 1) % messages.length;
    }

    updateText();
    setInterval(updateText, 3750);
  </script>
</body>
</html>
